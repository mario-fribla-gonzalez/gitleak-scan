title = "gitleaks config"

[allowlist]
  description = "global allow lists"
  paths = ["gitleaks.toml", "(.*?)(jpg|gif|doc|docx|zip|xls|pdf|bin|svg|socket)$", "(go.mod|go.sum)$", "gradle.lockfile", "node_modules", "package-lock.json", "pnpm-lock.yaml", "Database.refactorlog", "vendor"]

[[rules]]
  description = "Adafruit API Key"
  id = "adafruit-api-key"
  keywords = ["adafruit"]
  regex = "(?i)(?:adafruit)(?:[0-9a-z\\-_\\t .]{0,20})(?:[\\s|']|[\\s|\"]){0,3}(?:=|>|:=|\\|\\|:|<=|=>|:)(?:'|\\\"|\\s|=|\\x60){0,5}([a-z0-9_-]{32})(?:['|\\\"|\\n|\\r|\\s|\\x60|;]|$)"
  secretGroup = 1

[[rules]]
  description = "Adobe Client ID (OAuth Web)"
  id = "adobe-client-id"
  keywords = ["adobe"]
  regex = "(?i)(?:adobe)(?:[0-9a-z\\-_\\t .]{0,20})(?:[\\s|']|[\\s|\"]){0,3}(?:=|>|:=|\\|\\|:|<=|=>|:)(?:'|\\\"|\\s|=|\\x60){0,5}([a-f0-9]{32})(?:['|\\\"|\\n|\\r|\\s|\\x60|;]|$)"
  secretGroup = 1

[[rules]]
  description = "Adobe Client Secret"
  id = "adobe-client-secret"
  keywords = ["p8e-"]
  regex = "(?i)\\b((p8e-)(?i)[a-z0-9]{32})(?:['|\\\"|\\n|\\r|\\s|\\x60|;]|$)"

